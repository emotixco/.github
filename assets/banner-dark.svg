<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320">
  <rect width="1200" height="320" fill="#0a0a0b"/>

  <!-- Minimal dot grid — structured chaos -->
  <g fill="#a8a29e" opacity="0.08">
    <circle cx="40" cy="40" r="1.5"/><circle cx="80" cy="40" r="1.5"/><circle cx="120" cy="40" r="1.5"/><circle cx="160" cy="40" r="1.5"/><circle cx="200" cy="40" r="1.5"/>
    <circle cx="40" cy="80" r="1.5"/><circle cx="80" cy="80" r="1.5"/><circle cx="120" cy="80" r="1.5"/><circle cx="160" cy="80" r="1.5"/><circle cx="200" cy="80" r="1.5"/>
    <circle cx="40" cy="120" r="1.5"/><circle cx="80" cy="120" r="1.5"/><circle cx="120" cy="120" r="1.5"/><circle cx="160" cy="120" r="1.5"/><circle cx="200" cy="120" r="1.5"/>
    <circle cx="1000" cy="200" r="1.5"/><circle cx="1040" cy="200" r="1.5"/><circle cx="1080" cy="200" r="1.5"/><circle cx="1120" cy="200" r="1.5"/><circle cx="1160" cy="200" r="1.5"/>
    <circle cx="1000" cy="240" r="1.5"/><circle cx="1040" cy="240" r="1.5"/><circle cx="1080" cy="240" r="1.5"/><circle cx="1120" cy="240" r="1.5"/><circle cx="1160" cy="240" r="1.5"/>
    <circle cx="1000" cy="280" r="1.5"/><circle cx="1040" cy="280" r="1.5"/><circle cx="1080" cy="280" r="1.5"/><circle cx="1120" cy="280" r="1.5"/><circle cx="1160" cy="280" r="1.5"/>
  </g>

  <!-- Single accent line — chromatic restraint -->
  <rect x="560" y="50" width="80" height="3" rx="1.5" fill="#6172f3"/>

  <!-- Bold headline — typography as architecture -->
  <text x="600" y="112" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="56" font-weight="700" fill="#fafaf9" text-anchor="middle" letter-spacing="-2">DESCRIBE YOUR IDEA.</text>
  <text x="600" y="168" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="56" font-weight="700" fill="#fafaf9" text-anchor="middle" letter-spacing="-2">WE RESEARCH IT.</text>

  <!-- Subline — stone color, restrained -->
  <text x="600" y="215" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="17" fill="#a8a29e" text-anchor="middle" letter-spacing="0.5">AI agents for market research, competitor analysis, and product strategy</text>

  <!-- Whisper divider -->
  <rect x="540" y="240" width="120" height="1" fill="#292524"/>

  <!-- Minimal stats row -->
  <g font-family="Inter, system-ui, -apple-system, sans-serif" text-anchor="middle">
    <text x="420" y="280" font-size="22" font-weight="700" fill="#fafaf9">260+</text>
    <text x="420" y="300" font-size="11" fill="#a8a29e" letter-spacing="1.5">FOUNDERS</text>

    <rect x="510" y="268" width="1" height="36" fill="#292524"/>

    <text x="600" y="280" font-size="22" font-weight="700" fill="#fafaf9">8 min</text>
    <text x="600" y="300" font-size="11" fill="#a8a29e" letter-spacing="1.5">AVG SESSION</text>

    <rect x="690" y="268" width="1" height="36" fill="#292524"/>

    <text x="780" y="280" font-size="22" font-weight="700" fill="#fafaf9">$29</text>
    <text x="780" y="300" font-size="11" fill="#a8a29e" letter-spacing="1.5">/MONTH</text>
  </g>
</svg>
